services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-bssmeod/eodi-discordbot}:${DOCKER_IMAGE_TAG:-latest}
    container_name: eodi-discordbot
    restart: always
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
    networks:
      - eodi-discordbot-net

networks:
  eodi-discordbot-net:
    driver: bridge
